services:

  postgres:
    image: postgres:15
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: taskflow-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: taskflow-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis