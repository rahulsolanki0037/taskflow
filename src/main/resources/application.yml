spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/taskflow?options=-c%20TimeZone=Asia/Kolkata
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

    show-sql: true

  flyway:
    enabled: true
    out-of-order: true

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: mySecretKeymySecretKeymySecretKey